<!DOCTYPE html>

<html class="light" lang="vi">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700;800&amp;family=Inter:wght@400;500;600&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "background": "#f9f9f9",
                        "on-primary": "#ffffff",
                        "error": "#ba1a1a",
                        "secondary-fixed-dim": "#b0c6ff",
                        "tertiary-fixed": "#ffdbcd",
                        "on-tertiary-fixed-variant": "#7e2c00",
                        "on-secondary-fixed-variant": "#284580",
                        "inverse-on-surface": "#f0f1f1",
                        "tertiary-fixed-dim": "#ffb597",
                        "on-secondary": "#ffffff",
                        "surface-bright": "#f9f9f9",
                        "surface-container-low": "#f3f3f4",
                        "on-tertiary": "#ffffff",
                        "surface-tint": "#1273FF",
                        "on-tertiary-fixed": "#360f00",
                        "on-surface-variant": "#424655",
                        "tertiary-container": "#c94c00",
                        "surface-container-highest": "#e2e2e2",
                        "secondary": "#425d99",
                        "primary": "#1273FF",
                        "surface": "#f9f9f9",
                        "outline-variant": "#c2c6d8",
                        "on-secondary-container": "#2d4984",
                        "on-primary-fixed": "#001945",
                        "on-primary-fixed-variant": "#00429b",
                        "inverse-primary": "#b0c6ff",
                        "primary-container": "#d9eaff",
                        "outline": "#727787",
                        "on-error": "#ffffff",
                        "tertiary": "#a13b00",
                        "on-secondary-fixed": "#001945",
                        "secondary-container": "#a0bafd",
                        "surface-variant": "#e2e2e2",
                        "surface-dim": "#dadada",
                        "on-surface": "#1a1c1c",
                        "surface-container-lowest": "#ffffff",
                        "surface-container": "#eeeeee",
                        "surface-container-high": "#e8e8e8",
                        "on-error-container": "#93000a",
                        "on-primary-container": "#001945",
                        "on-tertiary-container": "#fffbff",
                        "error-container": "#ffdad6",
                        "primary-fixed": "#d9e2ff",
                        "inverse-surface": "#2f3131",
                        "secondary-fixed": "#d9e2ff",
                        "primary-fixed-dim": "#b0c6ff",
                        "on-background": "#1a1c1c"
                    },
                    fontFamily: {
                        "headline": ["Be Vietnam Pro"],
                        "body": ["Inter"],
                        "label": ["Inter"]
                    },
                    borderRadius: { "DEFAULT": "0.125rem", "lg": "0.25rem", "xl": "0.5rem", "full": "0.75rem" },
                },
            },
        }
    </script>
    <style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }

        .tap-highlight-none {
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Inter', sans-serif;
        }

        h1,
        h2,
        h3 {
            font-family: 'Be Vietnam Pro', sans-serif;
        }

        select {
            background-image: url("data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' fill='none' viewBox='0 0 20 20'%3e%3cpath stroke='%236b7280' stroke-linecap='round' stroke-linejoin='round' stroke-width='1.5' d='M6 8l4 4 4-4'/%3e%3c/svg%3e");
            background-position: right 0.5rem center;
            background-repeat: no-repeat;
            background-size: 1.5em 1.5em;
            padding-right: 2.5rem;
            -webkit-appearance: none;
            -moz-appearance: none;
            appearance: none;
        }
    </style>
</head>

<body class="bg-surface text-on-surface min-h-screen pb-32">
    <!-- Content Layout -->
    <main class="pt-4 px-4 max-w-2xl mx-auto space-y-6">
        <!-- Section: Thông tin chung (Driver & Advance) -->
        <section class="bg-surface-container-lowest rounded-xl p-5 space-y-4">
            <div class="flex items-center gap-2 mb-2">
                <span class="material-symbols-outlined text-primary" data-icon="person">person</span>
                <h2 class="text-on-surface font-bold text-base">Thông tin tài xế</h2>
            </div>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div class="space-y-1.5">
                    <label class="text-on-surface-variant font-medium text-xs ml-1 uppercase">Tên tài xế</label>
                    <select
                        class="w-full bg-surface-container-high border-none rounded-xl px-4 py-3 text-on-surface font-semibold focus:ring-2 focus:ring-primary outline-none">
                        <option disabled="" selected="" value="">Chọn tài xế...</option>
                        <option>Nguyễn Văn An</option>
                        <option>Trần Văn Bình</option>
                        <option>Lê Văn Cường</option>
                        <option>Phạm Văn Dũng</option>
                    </select>
                </div>
                <div class="space-y-1.5">
                    <label class="text-on-surface-variant font-medium text-xs ml-1 uppercase">Tiền ứng trước
                        (VNĐ)</label>
                    <input
                        class="w-full bg-surface-container-high border-none rounded-xl px-4 py-3 text-primary font-bold focus:ring-2 focus:ring-primary outline-none transition-all"
                        type="text" value="2.000.000" />
                </div>
            </div>
        </section>
        <!-- Section: LẤY HÀNG -->
        <section class="bg-surface-container-lowest rounded-xl p-5 space-y-4">
            <div class="flex items-center justify-between mb-2">
                <div class="flex items-center gap-2">
                    <span class="material-symbols-outlined text-tertiary" data-icon="upload">upload</span>
                    <h2 class="text-on-surface font-bold text-base">LẤY HÀNG</h2>
                </div>
                <span
                    class="bg-tertiary-fixed text-on-tertiary-fixed-variant text-[10px] font-bold px-2 py-0.5 rounded-full">BẮT
                    ĐẦU</span>
            </div>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div class="space-y-1.5">
                    <label class="text-on-surface-variant font-medium text-xs ml-1 uppercase">Ngày lấy</label>
                    <input
                        class="w-full bg-surface-container-high border-none rounded-xl px-4 py-3 text-on-surface focus:ring-2 focus:ring-primary outline-none"
                        type="date" value="2026-05-24" />
                </div>
                <div class="space-y-1.5">
                    <label class="text-on-surface-variant font-medium text-xs ml-1 uppercase">Nơi lấy</label>
                    <select
                        class="w-full bg-surface-container-high border-none rounded-xl px-4 py-3 text-on-surface focus:ring-2 focus:ring-primary outline-none">
                        <option>TPG</option>
                        <option>HL</option>
                        <option>KG</option>
                        <option>DQ</option>
                        <option>TLLT</option>
                        <option>TLTB</option>
                        <option>YP</option>
                        <option>X</option>
                    </select>
                </div>
                <div class="md:col-span-2 space-y-1.5">
                    <label class="text-on-surface-variant font-medium text-xs ml-1 uppercase">Số lượng lấy
                        (KG/Tấn)</label>
                    <input
                        class="w-full bg-surface-container-high border-none rounded-xl px-4 py-3 text-on-surface focus:ring-2 focus:ring-primary outline-none"
                        placeholder="Nhập khối lượng..." type="number" />
                </div>
            </div>
        </section>
        <!-- Section: GIAO HÀNG -->
        <section class="bg-surface-container-lowest rounded-xl p-5 space-y-4">
            <div class="flex items-center justify-between mb-2">
                <div class="flex items-center gap-2">
                    <span class="material-symbols-outlined text-primary" data-icon="download">download</span>
                    <h2 class="text-on-surface font-bold text-base">GIAO HÀNG</h2>
                </div>
                <span
                    class="bg-primary-fixed text-on-primary-fixed-variant text-[10px] font-bold px-2 py-0.5 rounded-full">KẾT
                    THÚC</span>
            </div>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div class="space-y-1.5">
                    <label class="text-on-surface-variant font-medium text-xs ml-1 uppercase">Ngày giao</label>
                    <input
                        class="w-full bg-surface-container-high border-none rounded-xl px-4 py-3 text-on-surface focus:ring-2 focus:ring-primary outline-none"
                        type="date" value="2026-05-24" />
                </div>
                <div class="space-y-1.5">
                    <label class="text-on-surface-variant font-medium text-xs ml-1 uppercase">Nơi giao</label>
                    <select
                        class="w-full bg-surface-container-high border-none rounded-xl px-4 py-3 text-on-surface focus:ring-2 focus:ring-primary outline-none">
                        <option>TBS</option>
                        <option>LHH</option>
                        <option>HT</option>
                        <option>NQ</option>
                        <option>TPH</option>
                        <option>DTT</option>
                        <option>BSLA</option>
                        <option>X</option>
                        <option>VTL</option>
                        <option>TDL</option>
                    </select>
                </div>
                <div class="md:col-span-2 space-y-1.5">
                    <label class="text-on-surface-variant font-medium text-xs ml-1 uppercase">Số lượng giao</label>
                    <input
                        class="w-full bg-surface-container-high border-none rounded-xl px-4 py-3 text-on-surface focus:ring-2 focus:ring-primary outline-none"
                        placeholder="Nhập khối lượng..." type="number" />
                </div>
            </div>
        </section>
        <!-- Section: CHI PHÍ & DẦU -->
        <section class="bg-surface-container-lowest rounded-xl p-5 space-y-4">
            <div class="flex items-center gap-2 mb-2">
                <span class="material-symbols-outlined text-secondary" data-icon="receipt_long">receipt_long</span>
                <h2 class="text-on-surface font-bold text-base">CHI PHÍ &amp; DẦU</h2>
            </div>
            <div class="grid grid-cols-12 gap-4">
                <div class="col-span-12 md:col-span-6 space-y-1.5">
                    <label class="text-on-surface-variant font-medium text-xs ml-1 uppercase">Dầu Nam Phát (Đ)</label>
                    <input
                        class="w-full bg-surface-container-high border-none rounded-xl px-4 py-3 text-on-surface focus:ring-2 focus:ring-primary outline-none"
                        placeholder="Số lượng..." type="number" />
                </div>
                <div class="col-span-12 md:col-span-6 space-y-1.5">
                    <label class="text-on-surface-variant font-medium text-xs ml-1 uppercase">Dầu HN (L)</label>
                    <input
                        class="w-full bg-surface-container-high border-none rounded-xl px-4 py-3 text-on-surface focus:ring-2 focus:ring-primary outline-none"
                        placeholder="Số lượng..." type="number" />
                </div>
                <div class="col-span-12 space-y-1.5">
                    <label class="text-on-surface-variant font-medium text-xs ml-1 uppercase">Phí bến bãi / bốc
                        xếp</label>
                    <input
                        class="w-full bg-surface-container-high border-none rounded-xl px-4 py-3 text-on-surface focus:ring-2 focus:ring-primary outline-none"
                        placeholder="0 VNĐ" type="number" />
                </div>
                <div class="col-span-12 space-y-4 pt-2 border-t border-slate-100 dark:border-slate-800">
                    <div class="flex items-center justify-between">
                        <h3 class="text-on-surface-variant font-bold text-xs uppercase tracking-wider">Chi phí phát sinh
                        </h3>
                        <button
                            class="flex items-center gap-1 text-[#1273FF] font-bold text-xs hover:opacity-80 transition-opacity">
                            <span class="material-symbols-outlined text-sm" data-icon="add_circle">add_circle</span>
                            Thêm chi phí
                        </button>
                    </div>
                    <div
                        class="space-y-3 bg-slate-50 dark:bg-slate-800/50 p-3 rounded-xl border border-dashed border-slate-200 dark:border-slate-700">
                        <div class="grid grid-cols-2 gap-3">
                            <div class="space-y-1.5">
                                <label class="text-on-surface-variant font-medium text-[10px] ml-1 uppercase">Tên chi
                                    phí</label>
                                <input
                                    class="w-full bg-white dark:bg-slate-900 border-none rounded-lg px-3 py-2 text-sm text-on-surface focus:ring-2 focus:ring-primary outline-none"
                                    placeholder="Ví dụ: Cầu đường" type="text" />
                            </div>
                            <div class="space-y-1.5">
                                <label class="text-on-surface-variant font-medium text-[10px] ml-1 uppercase">Số
                                    tiền</label>
                                <input
                                    class="w-full bg-white dark:bg-slate-900 border-none rounded-lg px-3 py-2 text-sm text-[#1273FF] font-bold focus:ring-2 focus:ring-primary outline-none"
                                    placeholder="0 VNĐ" type="number" />
                            </div>
                        </div>
                        <div class="space-y-1.5">
                            <label class="text-on-surface-variant font-medium text-[10px] ml-1 uppercase">Ghi chú
                                phí</label>
                            <input
                                class="w-full bg-white dark:bg-slate-900 border-none rounded-lg px-3 py-2 text-sm text-on-surface focus:ring-2 focus:ring-primary outline-none"
                                placeholder="Nhập ghi chú cho khoản phí này..." type="text" />
                        </div>
                    </div>
                </div>
                <div class="col-span-12 space-y-1.5">
                    <label class="text-on-surface-variant font-medium text-xs ml-1 uppercase">Ghi chú</label>
                    <textarea
                        class="w-full bg-surface-container-high border-none rounded-xl px-4 py-3 text-on-surface focus:ring-2 focus:ring-primary outline-none resize-none"
                        placeholder="Nhập ghi chú chuyến đi..." rows="3"></textarea>
                </div>
            </div>
        </section>
    </main>
    <!-- Bottom Action Bar (Fixed) -->
    <div
        class="fixed bottom-0 left-0 w-full z-50 p-4 bg-white/80 backdrop-blur-md border-t border-slate-100 dark:border-slate-800 flex gap-3 md:justify-center">
        <button
            class="flex-1 max-w-xs h-12 rounded-xl font-bold text-sm bg-slate-100 text-slate-600 hover:bg-slate-200 transition-colors active:scale-95">
            LƯU TẠM
        </button>
        <button
            class="flex-[2] max-w-sm h-12 rounded-xl font-bold text-sm bg-gradient-to-r from-[#1273FF] to-[#0056c5] text-white shadow-lg shadow-blue-500/20 active:scale-95 transition-all">
            HOÀN TẤT CHUYẾN
        </button>
    </div>
</body>

</html>
